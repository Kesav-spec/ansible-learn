---
- hosts: all
  become: true

  tasks:


    - name: update repo index
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_distribution == "Ubuntu"

    - name: remove apache2 package
      ansible.builtin.apt:
        name: apache2
        state: absent
      when: ansible_distribution == "Ubuntu"

    - name: remove php support
      ansible.builtin.apt:
        name: libapache2-mod-php
        state: absent
      when: ansible_distribution == "Ubuntu"
    
    - name: update repo index
      ansible.builtin.dnf:
        update_cache: yes
      when: ansible_distribution == "fedora"

    - name: REMOVE APACHE-PACKAGE-FED
      ansible.builtin.dnf:
        name: httpd
        state: absent
      when: ansible_distribution == "Fedora"

    
    - name: Remove Php support
      ansible.builtin.dnf:
        name: php
        state: absent
      when: ansible_distribution == "Fedora"



    
    
    
    
    
    
